<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Kriptografi - Project CLO 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Aplikasi Kriptografi</h1>
    <p style="text-align: center; margin-top:0;">Project CLO 1 - Keamanan Sistem</p>

    <h3>1. Pengaturan Mode & Aksi</h3>
    <div class="form-group">
        <label>Mode Operasi:</label>
        <div class="radio-group">
            <label><input type="radio" name="mode" value="ECB" checked> ECB (Electronic Codebook)</label>
            <label><input type="radio" name="mode" value="CBC"> CBC (Cipher Block Chaining)</label>
        </div>
    </div>
    <div class="form-group">
        <label>Aksi:</label>
        <div class="radio-group">
            <label><input type="radio" name="aksi" value="encrypt" checked> Encrypt Data</label>
            <label><input type="radio" name="aksi" value="decrypt"> Decrypt Data</label>
        </div>
    </div>

    <h3>2. Pengaturan Kunci (Key)</h3>
    <div class="form-group">
        <label>Kunci Angka (Substitusi):</label>
        <input type="number" id="shiftKey" class="input-inline" value="" placeholder="Contoh: 3">
    </div>
    <div class="form-group">
        <label>Kunci Teks (XOR) [CBC]:</label>
        <input type="text" id="xorKey" class="input-inline" value="" placeholder="Contoh: KUNC">
    </div>

    <h3>3. Data Input</h3>
    <label>Masukkan Teks (Plaintext / Biner untuk Decrypt):</label>
    <textarea id="inputText" rows="4" placeholder="Ketik teks di sini..."></textarea>

    <button onclick="jalankanProses()">JALANKAN PROSES</button>

    <h3>4. Hasil Akhir</h3>
    <textarea id="outputText" class="output-box" rows="4" readonly></textarea>

    <h3>5. Log Proses Langkah-demi-Langkah</h3>
    <textarea id="logText" class="log-box" rows="8" readonly></textarea>
</div>

<script src="script.js"></script>
</body>
</html>
